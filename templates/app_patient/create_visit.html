{% extends 'app_patient/_base.html' %}
{% load static %}

{% block title %}
    ثبت ویزیت جدید
{% endblock %}

{% block content %}
    <div class="row p-1">

        <!-- form -->
        <form method="post" action="" class="col-12 play_fair_font">
            {% csrf_token %}

            <!-- patient name -->
            <h4 class="font-weight-bold b_nazanin py-2 text-right border-bottom border-secondary mb-4" data-aos="fade-up" data-aos-duration="1200">
                <span>
                    <span>ثبت ویزیت جدید</span>
                    <span><a href="{% url 'app_patient:patient_detail' patient.id %}">({{ patient.full_name }})</a></span>
                </span>
            </h4>

            <!-- patient id -->
            <select name="patient" required="" id="id_patient" hidden>
              <option value="{{ patient.pk }}" selected="selected"></option>
            </select>

            <div class="row align-items-center justify-content-around">
                <div class="col-12 px-4 col-lg-5">
                    <!-- chief complaint -->
                    <div class="row justify-content-between align-items-center text-right mb-3" data-aos="fade-up" data-aos-duration="1300">
                        <label for="id_chief_complaint" class="form-label b_nazanin font-weight-bold">شکایت بیمار</label>
                        <label for="id_chief_complaint" class="form-label text-secondary">Chief complaint</label>
                        <textarea name="chief_complaint" id="id_chief_complaint" cols="30" rows="5" class="form-control b_nazanin" placeholder="شکایت بیمار"></textarea>
                    </div>

                    <!-- Physical exam -->
                    <div class="row justify-content-between align-items-center text-right mb-4" data-aos="fade-up" data-aos-duration="1400">
                        <label for="id_physical_exam" class="form-label b_nazanin font-weight-bold">معاینات و آزمایشات</label>
                        <label for="id_physical_exam" class="form-label text-secondary">Physical exam</label>
                        <textarea name="physical_exam" cols="30" rows="5" class="form-control b_nazanin" id="id_physical_exam" placeholder="معاینات و آزمایشات"></textarea>
                    </div>
                </div>
                <div class="col-12 px-4 col-lg-6">
                    <!-- checklist -->
                    <div class="row justify-content-around mb-4" data-aos="fade-up" data-aos-duration="1500">
                        <div class="col-12 b_nazanin border-bottom border-secondary row justify-content-between mb-2">
                            <div class="col-auto b_nazanin font-weight-bold">چک لیست</div>
                            <div class="col-auto text-secondary">checklist</div>
                        </div>
                        <div class="form-check col-auto">
                            <label class="form-check-label" for="id_manipulation">Manipulation</label>
                            <input class="form-check-input" type="checkbox" name="manipulation" id="id_manipulation">
                        </div>
                        <div class="form-check col-auto">
                            <label for="id_needle" class="form-check-label">Needle</label>
                            <input type="checkbox" name="needle" id="id_needle" class="form-check-input">
                        </div>
                        <div class="form-check col-auto">
                            <label for="id_injection" class="form-check-label">Injection</label>
                            <input type="checkbox" name="injection" id="id_injection" class="form-check-input">
                        </div>
                        <div class="form-check col-auto">
                            <label for="id_emg" class="form-check-label">EMG</label>
                            <input type="checkbox" name="emg" id="id_emg" class="form-check-input">
                        </div>
                        <div class="form-check col-auto">
                            <label for="id_physiotherapy" class="form-check-label">Physiotherapy</label>
                            <input type="checkbox" name="physiotherapy" id="id_physiotherapy" class="form-check-input">
                        </div>
                    </div>

                    <!-- procedure -->
                    <div class="row justify-content-between align-items-center text-right mb-4" data-aos="fade-up" data-aos-duration="1500">
                        <label for="id_procedure" class="form-label b_nazanin font-weight-bold">روند درمان</label>
                        <label for="id_procedure" class="form-label text-secondary">Procedure</label>
                        <textarea name="procedure" cols="30" rows="5" class="form-control b_nazanin" id="id_procedure" placeholder="روند درمان"></textarea>
                    </div>

                    <!-- payment -->
                    <div class="row justify-content-between align-items-center text-right mb-4" data-aos="fade-up" data-aos-duration="1600">
                        <label for="id_payment" class="form-label b_nazanin font-weight-bold">هزینه پرداخت شده (هزار تومان)</label>
                        <input type="number" name="payment" class="form-control text-left dir_ltr" value="0" required="" id="id_payment">
                    </div>
                </div>
            </div>


            <!-- datetime -->
            <div hidden>
                {{ form.datetime }}
            </div>

            <!-- button -->
            <div class="mb-1 px-5 text-right" data-aos="fade-up" data-aos-duration="1700">
                <button type="submit" class="btn btn-success b_nazanin">ثبت</button>
                <a href="{% url 'app_patient:visit_list' patient.pk %}" class="btn btn-info b_nazanin">لیست ویزیت ها</a>
            </div>

        </form>

    </div>
{% endblock %}
