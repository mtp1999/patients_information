{% extends 'app_patient/_base.html' %}
{% load static %}

{% block title %}
    بروزرسانی اطلاعات شخصی
{% endblock %}


{% block content %}
    <div class="row align-items-center">
        <form class="text-right col-md-5" method="post" action="">
            {% csrf_token %}
            <h3 class="b_nazanin font-weight-bold mb-3" data-aos="fade-up" data-aos-duration="1000">
                <span>
                    بروزرسانی شماره تماس
                </span>
                <span>
                    {{ phone.patient.full_name }}
                </span>
            </h3>

            <select name="patient" required id="id_patient" hidden>
              <option value="{{ phone.patient.pk }}" selected="selected"></option>
            </select>
            <div class="mb-3" data-aos="fade-up" data-aos-duration="1250">
              <label for="id_number1" class="form-label b_nazanin"><h4>شماره تماس ۱</h4></label>
              <input type="text" class="form-control text-left dir_ltr" id="id_number1" name="number1" value="{{ phone.number1 }}" maxlength="11" required placeholder="number1">
            </div>
            <div class="mb-3" data-aos="fade-up" data-aos-duration="1250">
              <label for="id_number2" class="form-label b_nazanin"><h4>شماره تماس ۲</h4></label>
              <input type="text" class="form-control text-left dir_ltr" id="id_number2" name="number2" value="{{ phone.number2 }}" maxlength="11" required placeholder="number2">
            </div>
            <div class="mb-3" data-aos="fade-up" data-aos-duration="1250">
              <label for="id_number3" class="form-label b_nazanin"><h4>شماره تماس ۳</h4></label>
              <input type="text" class="form-control text-left dir_ltr" id="id_number3" name="number3" value="{{ phone.number3 }}" maxlength="11" required placeholder="number3">
            </div>

            <div class="mb-1" data-aos="fade-up" data-aos-duration="2500">
              <button type="submit" class="btn btn-lg btn-success b_nazanin">ویرایش</button>
              <a href="{% url 'app_patient:patient_detail' phone.patient.pk %}" class="btn btn-lg btn-info b_nazanin">بازگشت</a>
            </div>
        </form>

        <div class="col-md-7" data-aos="fade-up" data-aos-duration="2000">
            <img src="{% static 'images/phone.png' %}" class="img-fluid">
        </div>
    </div>
{% endblock %}
